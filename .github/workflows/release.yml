name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate PHP syntax
        run: |
          find . -name '*.php' -type f -exec php -l {} \;

      - name: Validate JavaScript syntax
        run: |
          find assets blocks -name '*.js' -type f -exec node --check {} \;

      - name: Build plugin zip
        run: |
          mkdir -p build
          zip -r build/mermaid-content-blocks.zip . \
            -x ".git/*" \
            ".github/*" \
            ".gitignore" \
            "tests/*" \
            "examples.md" \
            "README.md" \
            "CONTRIBUTING.md" \
            "CHANGELOG.md" \
            "build/*" \
            "*.log"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: |
            See [CHANGELOG.md](CHANGELOG.md) for details about this release.
          draft: false
          prerelease: false
          files: ./build/mermaid-content-blocks.zip
